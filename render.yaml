services:
  - type: web
    name: transinfo-api
    runtime: docker
    plan: free
    dockerContext: .
    dockerfilePath: backend/Dockerfile
    autoDeploy: true
    healthCheckPath: /docs
    envVars:
      - key: DB_HOST
        sync: false
      - key: DB_PORT
        value: "4000"
      - key: DB_USER
        sync: false
      - key: DB_PASSWORD
        sync: false
      - key: DB_NAME
        sync: false
      - key: DB_SSL_CA
        value: /etc/ssl/certs/ca-certificates.crt
      - key: DB_SSL_DISABLED
        value: "false"
      - key: DB_SSL_VERIFY_CERT
        value: "true"
      - key: DB_SSL_VERIFY_IDENTITY
        value: "true"
      - key: DEFAULT_ADMIN_USERNAME
        value: admin
      - key: DEFAULT_ADMIN_PASSWORD
        sync: false
      - key: CORS_ALLOW_ORIGINS
        sync: false
      - key: CORS_ALLOW_ORIGIN_REGEX
        sync: false
      - key: AUTH_COOKIE_NAME
        value: transinfo_session
      - key: AUTH_COOKIE_SECURE
        value: "true"
      - key: AUTH_COOKIE_SAMESITE
        value: none
      - key: AUTH_COOKIE_DOMAIN
        value: ""
